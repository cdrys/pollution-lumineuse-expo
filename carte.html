    function couleur(r){
      if(r>=50)return'#ff3300';if(r>=35)return'#ff6b35';if(r>=25)return'#f59e0b';
      if(r>=15)return'#fde68a';if(r>=8)return'#67e8f9';return'#4ade80';
    }
    function bortle(r){
      if(r>=50)return{n:'8-9',t:'Ciel gris/blanc'};if(r>=35)return{n:'8',t:'Ciel gris clair'};
      if(r>=20)return{n:'7-8',t:'Transition ville'};if(r>=10)return{n:'6-7',t:'Suburbain'};
      if(r>=5)return{n:'5-6',t:'Semi-rural'};return{n:'4-5',t:'Rural'};
    }
    function typeLabel(t){return{centre:'Centre-ville',peri_dense:'Périurbain dense',peri_moyen:'Périurbain moyen',rural:'Rural'}[t]||t;}
    function radiance(c,annee){const t=(annee-2012)/10;return parseFloat((c.r2012+(c.r2022-c.r2012)*t).toFixed(1));}

    const map = L.map('expo-map').setView([48.5734,7.7400],11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

    function nasaUrl(y){return `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/${y}-01-01/GoogleMapsCompatible/{z}/{y}/{x}.jpg`;}
    let nasaLayer = L.tileLayer(nasaUrl(2022),{opacity:0.65,maxZoom:12}).addTo(map);

    const layerCommunes = L.layerGroup();
    let anneeActive = 2022, filtreActif = 'tous';

    function creerMarqueurs(annee){
      layerCommunes.clearLayers();
      communes.filter(c=>filtreActif==='tous'||c.type===filtreActif).forEach(c=>{
        const r=radiance(c,annee),b=bortle(r),col=couleur(r);
        const radius=c.type==='centre'?20:c.type==='peri_dense'?14:c.type==='peri_moyen'?10:7;
        L.circleMarker([c.lat,c.lng],{radius,fillColor:col,color:col,fillOpacity:0.5,weight:2,opacity:0.95})
          .bindPopup(`<div class="popup-nom">${c.nom}</div><div class="popup-val">Radiance (${annee}) : <strong>${r} nW/cm²/sr</strong><br>Hausse 2012→2022 : <strong>+${(((c.r2022-c.r2012)/c.r2012)*100).toFixed(1)} %</strong><br><span style="font-size:0.82rem;color:#a5b4ce;">Bortle ${b.n} — ${b.t}</span></div>`)
          .addTo(layerCommunes);
      });
    }
    creerMarqueurs(2022);
    layerCommunes.addTo(map);

    function changerAnnee(val){
      anneeActive=parseInt(val);
      document.getElementById('annee-label').textContent=val;
      map.removeLayer(nasaLayer);
      nasaLayer=L.tileLayer(nasaUrl(anneeActive),{opacity:0.65,maxZoom:12}).addTo(map);
      layerCommunes.addTo(map);
      creerMarqueurs(anneeActive);
    }

    function filtrerType(type){
      filtreActif=type;
      document.querySelectorAll('.expo-filtre-btn:not(#btn-heat)').forEach(b=>b.classList.remove('actif'));
      document.getElementById('btn-'+(type==='tous'?'tous':type==='centre'?'centre':type==='peri_dense'?'dense':type==='peri_moyen'?'moyen':'rural')).classList.add('actif');
      creerMarqueurs(anneeActive);
    }

    // Heatmap
    let heatLayer=null,heatActif=true,anneeHeat='2022';
    function buildHeat(yr){
      const maxR=Math.max(...HEAT_DATA[yr].map(p=>p[2]));
      return L.heatLayer(HEAT_DATA[yr].map(p=>[p[0],p[1],p[2]/maxR]),{radius:55,blur:40,maxZoom:13,max:1.0,opacity:0.65,gradient:{0:'#000080',0.3:'#0080ff',0.55:'#00ffff',0.75:'#ffff00',0.9:'#ff8000',1:'#ff0000'}});
    }
    heatLayer=buildHeat('2022');heatLayer.addTo(map);

    function toggleHeat(){
      heatActif=!heatActif;
      document.getElementById('btn-heat').classList.toggle('actif-vert',heatActif);
      if(heatActif){heatLayer=buildHeat(anneeHeat);heatLayer.addTo(map);}
      else{if(heatLayer)map.removeLayer(heatLayer);}
    }

    // Tour guide - affiche toujours en expo
    const STEPS=[
      {tag:"Étape 1 / 5",title:"Le curseur temporel",text:"Glissez ce curseur pour voir l'évolution de la radiance nocturne de 2012 à 2022 dans les 33 communes.",pos:{top:'130px',bottom:'auto',left:'80px',right:'auto',transform:'none'}},
      {tag:"Étape 2 / 5",title:"Cliquez sur une commune",text:"Chaque cercle est une commune. Cliquez dessus pour voir sa radiance exacte, son taux de hausse et sa classe Bortle.",pos:{top:'50%',left:'60%',right:'auto',bottom:'auto',transform:'translateY(-50%)'}},
      {tag:"Étape 3 / 5",title:"Filtrer par type",text:"Ces boutons filtrent les communes : centre, périurbain dense ou moyen, rural. Comparez les dynamiques territoriales.",pos:{top:'140px',right:'20px',left:'auto',bottom:'auto',transform:'none'}},
      {tag:"Étape 4 / 5",title:"La heatmap",text:"La heatmap affiche la radiance en coeur de nuit jusqu'en 2024 (source Cerema). Les zones froides montrent l'effet des extinctions nocturnes.",pos:{top:'140px',right:'20px',left:'auto',bottom:'auto',transform:'none'}},
      {tag:"Étape 5 / 5",title:"Le bouton ⓘ — Comprendre ce qu'on voit",text:"En bas à gauche de la carte, le bouton ⓘ affiche une explication contextuelle sur ce que révèle la carte pour l'année sélectionnée. Il se met à jour automatiquement quand vous bougez le curseur.",pos:{top:'auto',bottom:'5.5rem',left:'5rem',right:'auto',transform:'none'}}
    ];
    let step=0;
    function tourRender(){
      const s=STEPS[step];
      document.getElementById('t-tag').textContent=s.tag;
      document.getElementById('t-title').textContent=s.title;
      document.getElementById('t-text').textContent=s.text;
      const card=document.getElementById('expo-tour-card');
      card.style.top=s.pos.top||'auto';
      card.style.left=s.pos.left||'auto';
      card.style.right=s.pos.right||'auto';
      card.style.bottom=s.pos.bottom||'auto';
      card.style.transform=s.pos.transform||'none';
      document.querySelectorAll('#t-dots div').forEach((d,i)=>d.style.background=i===step?'var(--or)':'rgba(255,255,255,0.2)');
      document.querySelector('.expo-tour-btn').textContent=step===STEPS.length-1?'Terminer ✓':'Suivant →';
    }
    function tourNext(){step++;if(step>=STEPS.length){tourSkip();}else{tourRender();}}
    function tourSkip(){document.getElementById('expo-tour-card').classList.add('hidden');}
    tourRender();

    // ── Panneau info contextuel ───────────────────────────────
    const INFO_TEXTS = {
      2012: "En <strong>2012</strong>, le gradient centre–périphérie est déjà marqué : Strasbourg rayonne à <strong>48 nW/cm²/sr</strong>, soit cinq fois plus que les communes rurales de l'ouest comme Kolbsheim ou Blaesheim. Ce contraste reflète une décennie d'urbanisation différenciée — le centre dense contre la couronne agricole.",
      2014: "En <strong>2014</strong>, le gradient territorial se maintient. Les communes de la première couronne — Schiltigheim, Bischheim, Hœnheim — affichent des radiances proches de Strasbourg, signe d'une conurbation déjà fortement lumineuse au nord de l'agglomération.",
      2016: "En <strong>2016</strong>, une première inflexion est visible : <strong>Illkirch-Graffenstaden</strong> et <strong>Vendenheim</strong> commencent à mettre en place des politiques d'extinction nocturne, détectables par satellite. La transition LED, engagée dans plusieurs communes, ne compense pas encore la hausse globale.",
      2018: "En <strong>2018</strong>, l'arrêté du 27 décembre impose l'extinction des enseignes commerciales entre 1h et 6h. L'effet est encore limité — la radiance continue d'augmenter dans la majorité des communes — mais les premières données indiquent un léger ralentissement dans les zones d'activité.",
      2020: "En <strong>2020</strong>, l'empreinte des confinements Covid-19 est mesurable depuis l'espace : une baisse de 2 à 4 % de la radiance s'observe dans presque toutes les communes. Ce signal montre que l'éclairage commercial et tertiaire contribue significativement à la pollution lumineuse.",
      2022: "En <strong>2022</strong>, le gradient centre–périphérie reste net : <strong>Schiltigheim</strong> domine à 38 nW/cm²/sr, devant Bischheim et Strasbourg. Les communes rurales de l'ouest — <strong>Blaesheim (3 nW), Kolbsheim (1,7 nW), Osthoffen (2,4 nW)</strong> — ont fortement réduit leur radiance grâce aux politiques d'extinction. L'écart entre communes actives et inactives se creuse visiblement."
    };

    let infoPanelOpen = false;

    function toggleInfo() {
      infoPanelOpen = !infoPanelOpen;
      const panel = document.getElementById('info-panel');
      panel.classList.toggle('hidden', !infoPanelOpen);
      if (infoPanelOpen) updateInfoText();
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function updateInfoText() {
      if (!infoPanelOpen) return;
      const yr = anneeActive;
      // Find closest year in our texts
      const years = Object.keys(INFO_TEXTS).map(Number).sort((a,b)=>a-b);
      const closest = years.reduce((prev, curr) => Math.abs(curr-yr) < Math.abs(prev-yr) ? curr : prev);
      document.getElementById('info-panel-year').textContent = 'Lecture · ' + yr;
      document.getElementById('info-panel-text').innerHTML = INFO_TEXTS[closest];
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    // Hook into changerAnnee to update panel when slider moves
    const _origChangerAnnee = changerAnnee;
    changerAnnee = function(val) {
      _origChangerAnnee(val);
      updateInfoText();
    };

  </script>
  <script>document.addEventListener("DOMContentLoaded",()=>lucide.createIcons());</script>
</body>
