  <script>
    const D=[{"nom": "Strasbourg", "changes": "R", "mE": 33.66, "mL": 24.12, "ev": -28.3}, {"nom": "Schiltigheim", "changes": "R", "mE": 46.87, "mL": 31.54, "ev": -32.7}, {"nom": "Illkirch-Graffenstaden", "changes": "E", "mE": 17.77, "mL": 11.67, "ev": -34.3}, {"nom": "Ostwald", "changes": "R", "mE": 21.68, "mL": 13.93, "ev": -35.7}, {"nom": "Bischheim", "changes": "R", "mE": 41.35, "mL": 28.53, "ev": -31.0}, {"nom": "Hoenheim", "changes": "R", "mE": 39.49, "mL": 27.25, "ev": -31.0}, {"nom": "Lingolsheim", "changes": "R", "mE": 24.3, "mL": 15.42, "ev": -36.5}, {"nom": "Souffelweyersheim", "changes": "R", "mE": 23.47, "mL": 15.87, "ev": -32.4}, {"nom": "Mundolsheim", "changes": "ER", "mE": 16.29, "mL": 9.63, "ev": -40.9}, {"nom": "Vendenheim", "changes": "E", "mE": 7.23, "mL": 4.63, "ev": -36.0}, {"nom": "Reichstett", "changes": "R", "mE": 10.73, "mL": 5.83, "ev": -45.7}, {"nom": "Eckbolsheim", "changes": "R", "mE": 20.39, "mL": 12.16, "ev": -40.4}, {"nom": "Wolfisheim", "changes": "E", "mE": 9.34, "mL": 4.18, "ev": -55.2}, {"nom": "Geispolsheim", "changes": "R", "mE": 9.04, "mL": 6.58, "ev": -27.2}, {"nom": "Fegersheim", "changes": "E", "mE": 12.09, "mL": 8.15, "ev": -32.6}, {"nom": "Niederhausbergen", "changes": "R", "mE": 10.45, "mL": 7.0, "ev": -33.0}, {"nom": "Mittelhausbergen", "changes": "R", "mE": 15.07, "mL": 9.86, "ev": -34.6}, {"nom": "Oberhausbergen", "changes": "ER", "mE": 16.3, "mL": 7.5, "ev": -54.0}, {"nom": "La Wantzenau", "changes": "E", "mE": 8.43, "mL": 5.36, "ev": -36.4}, {"nom": "Lampertheim", "changes": "E", "mE": 10.32, "mL": 4.65, "ev": -54.9}, {"nom": "Lipsheim", "changes": "E", "mE": 7.36, "mL": 5.62, "ev": -23.6}, {"nom": "Entzheim", "changes": "X", "mE": 12.18, "mL": 9.96, "ev": -18.2}, {"nom": "Holtzheim", "changes": "R", "mE": 7.7, "mL": 5.01, "ev": -34.9}, {"nom": "Hangenbieten", "changes": "R", "mE": 5.88, "mL": 4.59, "ev": -21.9}, {"nom": "Achenheim", "changes": "R", "mE": 5.94, "mL": 4.71, "ev": -20.7}, {"nom": "Oberschaeffolsheim",     const mn=Math.min(...D.map(d=>d.mL)),mx=Math.max(...D.map(d=>d.mL));
    const cols=8,rows=Math.ceil(D.length/cols),W=960,H=480;
    D.forEach((d,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      const sz=22+((d.mL-mn)/(mx-mn))*85;
      const x=(col/cols)*W+(W/cols/2)+(Math.random()-.5)*18;
      const y=(row/rows)*H+(H/rows/2)+(Math.random()-.5)*12;
      const c=C[d.changes]||'#a5b4ce';
      const fs=sz>65?'.72rem':sz>42?'.6rem':'.52rem';
      document.getElementById('bw').innerHTML+=`<div class="bbl" style="width:${sz}px;height:${sz}px;left:${x-sz/2}px;top:${y-sz/2}px;background:${c}18;border-color:${c}55;" title="${d.nom} — ${d.mL.toFixed(1)} nW">
        <span style="font-family:'Space Mono',monospace;font-size:${fs};font-weight:700;color:${c};line-height:1;">${d.mL.toFixed(1)}</span>
        <span style="font-family:'Space Mono',monospace;font-size:${sz>50?.55:.45}rem;color:var(--gris-texte);padding:0 2px;line-height:1.2;">${d.nom.split('-')[0].substring(0,9)}</span>
      </div>`;
    });

  <script>(function(){const c=document.getElementById('sf'),x=c.getContext('2d');let s=[];function r(){c.width=innerWidth;c.height=innerHeight;}function i(){s=[];for(let n=0;n<160;n++)s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2+0.2,sp:Math.random()*.004+.001,o:Math.random()*Math.PI*2});}function d(t){x.clearRect(0,0,c.width,c.height);s.forEach(st=>{const a=.15+.7*Math.abs(Math.sin(st.o+t*st.sp));x.beginPath();x.arc(st.x,st.y,st.r,0,Math.PI*2);x.fillStyle=`rgba(232,234,246,${a})`;x.fill();});requestAnimationFrame(d);}window.addEventListener('resize',()=>{r();i();});r();i();requestAnimationFrame(d);})();</script>
